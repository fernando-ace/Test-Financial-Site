<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A static personal finance dashboard generated from the MoneySense monthly budget template."
    />
    <title>Monthly Budget Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const hasBuiltBundle = document.querySelector(
        'script[type="module"][crossorigin][src*="/assets/"]',
      );

      if (window.location.hostname.endsWith("github.io") && !hasBuiltBundle) {
        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = "/Test-Financial-Site/assets/index-CBPrRwZF.css";
        document.head.appendChild(stylesheet);

        const bundle = document.createElement("script");
        bundle.type = "module";
        bundle.src = "/Test-Financial-Site/assets/index-CYq7Rs_A.js";
        document.body.appendChild(bundle);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
